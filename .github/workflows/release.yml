name: Release

# Tag-driven GitHub Release only — publishing to npm is done manually.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # Run tests before cutting a release.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install

      - name: Run Tests (swar + simd)
        run: bun run test

      - name: Verify against V8
        run: bun run verify

  # Create the GitHub Release (no npm publish — that's manual).
  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Prefer the matching CHANGELOG.md section; fall back to commit log.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {p=1; next}
            p && /^## / {exit}
            p {print}
          ' CHANGELOG.md > RELEASE_NOTES.md || true
          if [ ! -s RELEASE_NOTES.md ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            echo "## Changes" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            if [ -z "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" --no-merges >> RELEASE_NOTES.md
            else
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges >> RELEASE_NOTES.md
            fi
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
